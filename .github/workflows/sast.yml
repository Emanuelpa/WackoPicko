name: SAST
on:
  push:
  pull_request:
    types: [opened, synchronize, reopened]
  schedule:
    - cron: "0 8 * * 1" # optional: weekly full scan every Monday at 8am

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for differential scanning

      - uses: fluidattacks/sast-action@1.3.0
        id: scan
        with:
          scan_config_path: .github/config.yaml

      - name: Fail if vulnerabilities found
        run: |
          count=$(tail -n +2 results.csv 2>/dev/null | wc -l | tr -d ' ')
          echo "Vulnerabilities found: $count"
          if [ "$count" -gt 0 ]; then
            exit 1
          fi